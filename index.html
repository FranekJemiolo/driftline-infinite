<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driftline Infinite - Deterministic Drift Racing Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 8px;
      pointer-events: none;
    }

    #controls h3 {
      margin-bottom: 10px;
      font-size: 14px;
    }

    #controls p {
      margin: 5px 0;
    }

    #seed-input {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    #seed-input input {
      width: 100px;
      padding: 8px;
      border-radius: 4px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    #seed-input button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #ff4444;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #seed-input button:hover {
      background: #ff6666;
    }

    #road-type {
      position: absolute;
      top: 60px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 8px;
    }

    #road-type h3 {
      margin-bottom: 5px;
      font-size: 14px;
    }

    #road-type select {
      padding: 8px;
      border-radius: 4px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
    }

    #debug-toggle {
      position: absolute;
      top: 140px;
      right: 20px;
    }

    #debug-toggle button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #ff4444;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #debug-toggle button:hover {
      background: #ff6666;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="controls">
    <h3>Controls</h3>
    <p><strong>WASD / Arrow Keys:</strong> Drive</p>
    <p><strong>Space:</strong> Handbrake</p>
    <p><strong>Gamepad:</strong> Supported</p>
  </div>

  <div id="seed-input">
    <input type="number" id="seed" value="1337" placeholder="Seed">
    <button id="set-seed">Set Seed</button>
  </div>


  <div id="debug-toggle">
    <button id="toggle-debug">Debug: OFF</button>
  </div>

  <script type="module">
    import { DriftGame } from './src/main.js'

    const seedInput = document.getElementById('seed')
    const setSeedBtn = document.getElementById('set-seed')
    const toggleDebugBtn = document.getElementById('toggle-debug')

    // Get seed from URL hash if present
    const hashSeed = window.location.hash.slice(1)
    if (hashSeed && !isNaN(parseInt(hashSeed))) {
      seedInput.value = parseInt(hashSeed)
    }

    const seed = parseInt(seedInput.value) || 1337

    const config = {
      type: Phaser.AUTO,
      width: window.innerWidth,
      height: window.innerHeight,
      parent: 'game-container',
      backgroundColor: '#1a1a2e',
      physics: false, // Disable physics - we use custom car physics
      scene: [DriftGame],
      scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH
      }
    }

    const game = new Phaser.Game(config)

    setSeedBtn.addEventListener('click', () => {
      const newSeed = parseInt(seedInput.value) || 1337
      window.location.hash = newSeed
      game.scene.scenes[0].setSeed(newSeed)
    })

    toggleDebugBtn.addEventListener('click', () => {
      game.scene.scenes[0].toggleDebug()
      toggleDebugBtn.textContent = game.scene.scenes[0].debugEnabled ? 'Debug: ON' : 'Debug: OFF'
    })
  </script>
</body>
</html>
