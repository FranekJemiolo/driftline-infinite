<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driftline Infinite - Deterministic Drift Racing Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 14px;
      pointer-events: none;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 8px;
    }

    #controls h3 {
      margin-bottom: 10px;
      font-size: 14px;
    }

    #controls p {
      margin: 5px 0;
    }

    #seed-input {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    #seed-input input {
      width: 100px;
      padding: 8px;
      border-radius: 4px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    #seed-input button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #ff4444;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #seed-input button:hover {
      background: #ff6666;
    }

    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 100;
    }

    #start-screen h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #ff4444;
      text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
    }

    #start-screen p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #ccc;
    }

    #start-screen button {
      padding: 15px 40px;
      font-size: 20px;
      border-radius: 8px;
      border: none;
      background: #ff4444;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }

    #start-screen button:hover {
      transform: scale(1.05);
      background: #ff6666;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="start-screen">
    <h1>Driftline Infinite</h1>
    <p>Deterministic Drift Racing Engine</p>
    <button id="start-btn">Start Drifting</button>
  </div>

  <div id="controls">
    <h3>Controls</h3>
    <p><strong>WASD / Arrow Keys:</strong> Drive</p>
    <p><strong>Space:</strong> Handbrake</p>
    <p><strong>Gamepad:</strong> Supported</p>
  </div>

  <div id="seed-input">
    <input type="number" id="seed" value="1337" placeholder="Seed">
    <button id="set-seed">Set Seed</button>
  </div>

  <script type="module">
    import { Game } from './src/game.js'

    const canvas = document.getElementById('gameCanvas')
    const startScreen = document.getElementById('start-screen')
    const startBtn = document.getElementById('start-btn')
    const seedInput = document.getElementById('seed')
    const setSeedBtn = document.getElementById('set-seed')

    // Get seed from URL hash if present
    const hashSeed = window.location.hash.slice(1)
    if (hashSeed && !isNaN(parseInt(hashSeed))) {
      seedInput.value = parseInt(hashSeed)
    }

    const seed = parseInt(seedInput.value) || 1337
    const game = new Game(canvas, seed)

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none'
      game.start()
    })

    setSeedBtn.addEventListener('click', () => {
      const newSeed = parseInt(seedInput.value) || 1337
      game.setSeed(newSeed)
      
      // Update URL hash
      window.location.hash = newSeed
    })
  </script>
</body>
</html>
